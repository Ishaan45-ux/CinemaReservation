<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Welcome to MovieTickets</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f4f4f9;
        }
        h1 { color: #333; }
        .button-container { margin-top: 30px; }
        
        .btn {
            padding: 10px 20px;
            margin: 10px;
            text-decoration: none;
            color: white;
            border-radius: 5px;
            font-size: 16px;
        }
        .btn-login { background-color: #007bff; }
        .btn-register { background-color: #28a745; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <h1>🎬 Welcome to MovieTickets!</h1>
    <p>Book your favorite movies quickly and securely.</p>

    <div class="button-container">
        <a th:href="@{/login}" class="btn btn-login">Login to Account</a>
        
        <a th:href="@{/register}" class="btn btn-register">Create New Account</a>
    </div>

</body>
</html>
